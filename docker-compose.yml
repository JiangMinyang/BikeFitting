# ─────────────────────────────────────────────────────────────────────────────
# Bike Fit Analyzer — Docker Compose
#
# Start:  docker compose up        (or: make run)
# Stop:   docker compose down      (or: make stop)
# ─────────────────────────────────────────────────────────────────────────────

services:
  web:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ~/BikeFitResults:/app/output
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/status')"]
      interval: 30s
      timeout: 5s
      retries: 3
